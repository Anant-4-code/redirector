</style>

<body>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const number = params.get('number');

  if (number) {
    const cleaned = number.toString().trim().replace(/[\s\-().]/g, '');

    // Fire the dial protocol immediately
    const a = document.createElement('a');
    a.href = 'ms-phone-new-call:?PhoneNumber=' + encodeURIComponent(cleaned);
    document.body.appendChild(a);
    a.click();

    // Close the tab instantly after
    setTimeout(() => window.close(), 100);
  }
})();
</script>
</body>
