<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Calling...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #00e676;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="status">Initiating call...</div>
<script>
  const params = new URLSearchParams(window.location.search);
  let number = params.get('number') || '';
  number = number.replace(/\s+/g, '').replace(/[^0-9+]/g, '');

  if (!number) {
    document.getElementById('status').innerHTML = 'No number provided.';
  } else {
    document.getElementById('status').innerHTML = 'Calling ' + number + '...';
    // Use standard tel: protocol for cross-platform and Phone Link support
    const a = document.createElement('a');
    a.href = 'tel:' + number;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    
    // Auto close tab after delay
    setTimeout(() => {
        window.close();
        document.getElementById('status').innerHTML = 'You can close this tab now.';
    }, 2000);
  }
</script>
</body>
</html>
