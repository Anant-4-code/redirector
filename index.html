<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Calling...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #00e676;
      font-size: 14px;
    }
  </style>
</head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  let number = params.get('number') || '';
  number = number.replace(/\s+/g, '').replace(/[^0-9+]/g, '');

  if (!number) {
    document.body.innerHTML = 'No number provided.';
  } else {
    // Try all possible protocols to open Phone Link
    const protocols = [
      'ms-phone:' + number,
      'tel:' + number,
    ];

    let tried = 0;

    function tryNext() {
      if (tried >= protocols.length) {
        // Last fallback — force tel: via anchor click
        const a = document.createElement('a');
        a.href = 'tel:' + number;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(() => window.close(), 1500);
        return;
      }
      window.location.href = protocols[tried++];
      setTimeout(tryNext, 800);
    }

    tryNext();

    // Auto close tab after 3 seconds
    setTimeout(() => window.close(), 3000);
  }
</script>
</body>
</html>
